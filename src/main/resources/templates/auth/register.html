<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body bg-gradient-dark d-flex align-items-center justify-content-center min-vh-100 py-4">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="auth-icon mb-3">
                    <i class="bi bi-wallet2 text-success" style="font-size: 3rem;"></i>
                </div>
                <h2 class="fw-bold text-white">Create Account</h2>
                <p class="text-white-50">Start tracking your expenses today</p>
            </div>

            <!-- Card -->
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-1">Sign Up</h5>
                    <p class="text-muted small mb-4">Fill in your details to create your account</p>

                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center py-2">
                        <i class="bi bi-exclamation-triangle-fill me-2 small"></i>
                        <small th:text="${errorMessage}"></small>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/auth/register}" th:object="${registerDto}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       class="form-control" placeholder="Choose a username">
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       class="form-control" placeholder="Enter your email">
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" th:field="*{password}"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       class="form-control" placeholder="Create a password">
                                <button type="button" class="btn btn-outline-secondary" id="togglePwd">
                                    <i class="bi bi-eye" id="eyePwd"></i>
                                </button>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                            <div class="text-muted mt-1" style="font-size:0.75rem;">
                                <i class="bi bi-info-circle me-1"></i>Min 8 chars, 1 uppercase, 1 number
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label small fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                       class="form-control" placeholder="Repeat your password">
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-semibold py-2">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </button>
                    </form>

                    <hr class="my-3">
                    <p class="text-center text-muted small mb-0">
                        Already have an account?
                        <a th:href="@{/auth/login}" class="text-success fw-semibold text-decoration-none">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('togglePwd').addEventListener('click', function() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyePwd');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
