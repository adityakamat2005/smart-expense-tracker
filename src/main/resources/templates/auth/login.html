<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body bg-gradient-dark d-flex align-items-center justify-content-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="auth-icon mb-3">
                    <i class="bi bi-wallet2 text-success" style="font-size: 3rem;"></i>
                </div>
                <h2 class="fw-bold text-white">ExpenseTracker</h2>
                <p class="text-white-50">Manage your finances smartly</p>
            </div>

            <!-- Card -->
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-1">Welcome back</h5>
                    <p class="text-muted small mb-4">Sign in to your account</p>

                    <!-- Alerts -->
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center py-2" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2 small"></i>
                        <small th:text="${errorMessage}"></small>
                        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show d-flex align-items-center py-2" role="alert">
                        <i class="bi bi-check-circle-fill me-2 small"></i>
                        <small th:text="${successMessage}"></small>
                        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${logoutMessage}" class="alert alert-info alert-dismissible fade show d-flex align-items-center py-2" role="alert">
                        <i class="bi bi-info-circle-fill me-2 small"></i>
                        <small th:text="${logoutMessage}"></small>
                        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/auth/login}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control"
                                       placeholder="Enter your username" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Enter your password" required>
                                <button type="button" class="btn btn-outline-secondary" id="togglePassword">
                                    <i class="bi bi-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-semibold py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>

                    <hr class="my-3">
                    <p class="text-center text-muted small mb-0">
                        Don't have an account?
                        <a th:href="@{/auth/register}" class="text-success fw-semibold text-decoration-none">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('togglePassword').addEventListener('click', function() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
