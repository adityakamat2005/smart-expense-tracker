<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
<div class="text-center">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 4rem;"></i>
    <h3 class="mt-3 fw-bold">Something went wrong</h3>
    <p class="text-muted" th:text="${errorMessage}">An unexpected error occurred.</p>
    <a href="/dashboard" class="btn btn-success rounded-pill px-4 mt-2">
        <i class="bi bi-house me-2"></i>Go to Dashboard
    </a>
</div>
</body>
</html>
