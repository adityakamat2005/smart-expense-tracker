<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Transaction' : 'Add Transaction' + ' | Smart Expense Tracker'">Transaction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="d-flex" id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="main-content" class="flex-grow-1 d-flex flex-column">

        <div th:replace="~{fragments/navbar :: navbar(pageTitle=${isEdit} ? 'Edit Transaction' : 'Add Transaction')}"></div>

        <div class="container-fluid px-4 pt-3">
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <div class="container-fluid px-4 py-3 flex-grow-1">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">

                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-header bg-white border-0 px-4 pt-4 pb-0">
                            <h5 class="fw-bold mb-1">
                                <i th:class="${isEdit} ? 'bi bi-pencil-square text-primary me-2' : 'bi bi-plus-circle text-success me-2'"></i>
                                <span th:text="${isEdit} ? 'Edit Transaction' : 'New Transaction'"></span>
                            </h5>
                            <p class="text-muted small">Fill in the transaction details below</p>
                        </div>
                        <div class="card-body px-4 pb-4">

                            <form th:action="${isEdit} ? @{/transactions/edit/{id}(id=${transactionDto.id})} : @{/transactions/add}"
                                  th:object="${transactionDto}"
                                  method="post" novalidate>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <!-- Transaction Type -->
                                <div class="mb-4">
                                    <label class="form-label small fw-semibold">Transaction Type *</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check type-check">
                                            <input class="form-check-input" type="radio" id="typeIncome"
                                                   th:field="*{type}" value="INCOME" onchange="filterCategories()">
                                            <label class="form-check-label type-label income-label" for="typeIncome">
                                                <i class="bi bi-arrow-down-circle me-1"></i>Income
                                            </label>
                                        </div>
                                        <div class="form-check type-check">
                                            <input class="form-check-input" type="radio" id="typeExpense"
                                                   th:field="*{type}" value="EXPENSE" onchange="filterCategories()">
                                            <label class="form-check-label type-label expense-label" for="typeExpense">
                                                <i class="bi bi-arrow-up-circle me-1"></i>Expense
                                            </label>
                                        </div>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                                </div>

                                <!-- Amount -->
                                <div class="mb-3">
                                    <label for="amount" class="form-label small fw-semibold">Amount (₹) *</label>
                                    <div class="input-group">
                                        <span class="input-group-text">₹</span>
                                        <input type="number" id="amount" th:field="*{amount}"
                                               th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"
                                               class="form-control" placeholder="0.00" step="0.01" min="0.01">
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                                </div>

                                <!-- Description -->
                                <div class="mb-3">
                                    <label for="description" class="form-label small fw-semibold">Description *</label>
                                    <input type="text" id="description" th:field="*{description}"
                                           th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                           class="form-control" placeholder="e.g., Monthly rent payment">
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                                </div>

                                <!-- Date -->
                                <div class="mb-3">
                                    <label for="date" class="form-label small fw-semibold">Date *</label>
                                    <input type="date" id="date" th:field="*{date}"
                                           th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"
                                           class="form-control">
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                                </div>

                                <!-- Category -->
                                <div class="mb-4">
                                    <label for="categoryId" class="form-label small fw-semibold">Category *</label>
                                    <select id="categoryId" th:field="*{categoryId}"
                                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'"
                                            class="form-select">
                                        <option value="">-- Select a Category --</option>
                                        <optgroup label="💰 Income" id="incomeGroup">
                                            <option th:each="cat : ${incomeCategories}"
                                                    th:value="${cat.id}"
                                                    th:text="${cat.name}"
                                                    th:selected="${transactionDto.categoryId == cat.id}">
                                            </option>
                                        </optgroup>
                                        <optgroup label="💸 Expense" id="expenseGroup">
                                            <option th:each="cat : ${expenseCategories}"
                                                    th:value="${cat.id}"
                                                    th:text="${cat.name}"
                                                    th:selected="${transactionDto.categoryId == cat.id}">
                                            </option>
                                        </optgroup>
                                    </select>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                                </div>

                                <!-- Buttons -->
                                <div class="d-flex gap-2">
                                    <a th:href="@{/transactions}" class="btn btn-outline-secondary rounded-pill px-4 flex-shrink-0">
                                        <i class="bi bi-arrow-left me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-success rounded-pill px-4 flex-grow-1 fw-semibold">
                                        <i th:class="${isEdit} ? 'bi bi-check-circle me-2' : 'bi bi-plus-circle me-2'"></i>
                                        <span th:text="${isEdit} ? 'Update Transaction' : 'Save Transaction'"></span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="bg-white border-top text-center text-muted small py-2 px-4">
            &copy; 2024 Smart Expense Tracker
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    function filterCategories() {
        const selected = document.querySelector('input[name="type"]:checked');
        const incomeGroup = document.getElementById('incomeGroup');
        const expenseGroup = document.getElementById('expenseGroup');
        const categorySelect = document.getElementById('categoryId');

        if (!selected) return;

        // Reset selection when type changes
        categorySelect.value = '';

        if (selected.value === 'INCOME') {
            incomeGroup.style.display = '';
            expenseGroup.style.display = 'none';
        } else {
            incomeGroup.style.display = 'none';
            expenseGroup.style.display = '';
        }
    }

    // Run on page load for edit mode
    document.addEventListener('DOMContentLoaded', function () {
        const selected = document.querySelector('input[name="type"]:checked');
        if (selected) filterCategories();
    });
</script>
</body>
</html>
