<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions | Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="d-flex" id="wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="main-content" class="flex-grow-1 d-flex flex-column">

        <div th:replace="~{fragments/navbar :: navbar(pageTitle='All Transactions')}"></div>

        <!-- Flash Messages -->
        <div class="container-fluid px-4 pt-3">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <div class="container-fluid px-4 py-3 flex-grow-1">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h5 class="fw-bold mb-1">All Transactions</h5>
                    <p class="text-muted small mb-0" th:text="${#lists.size(transactions)} + ' transactions found'"></p>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/export/transactions/excel}"
                       class="btn btn-outline-success rounded-pill px-4">
                        <i class="bi bi-file-earmark-excel me-1"></i>Export Excel
                    </a>
                    <a th:href="@{/transactions/add}" class="btn btn-success rounded-pill px-4">
                        <i class="bi bi-plus-circle me-2"></i>Add Transaction
                    </a>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(transactions)}" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i>
                        <h6>No transactions yet</h6>
                        <p class="small mb-3">Add your first transaction to get started.</p>
                        <a th:href="@{/transactions/add}" class="btn btn-success">
                            <i class="bi bi-plus me-1"></i>Add Transaction
                        </a>
                    </div>

                    <div th:unless="${#lists.isEmpty(transactions)}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="px-3 py-3 small fw-semibold">#</th>
                                <th class="py-3 small fw-semibold">Description</th>
                                <th class="py-3 small fw-semibold">Category</th>
                                <th class="py-3 small fw-semibold">Type</th>
                                <th class="py-3 small fw-semibold">Date</th>
                                <th class="py-3 small fw-semibold text-end">Amount</th>
                                <th class="py-3 small fw-semibold text-center pe-3">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="t, iStat : ${transactions}">
                                <td class="px-3 text-muted small" th:text="${iStat.count}"></td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div th:class="'txn-dot rounded-circle ' + (${t.type.name() == 'INCOME'} ? 'bg-success' : 'bg-danger')"></div>
                                        <span th:text="${t.description}"></span>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark border" th:text="${t.category.name}"></span>
                                </td>
                                <td>
                                    <span th:class="'badge rounded-pill ' + (${t.type.name() == 'INCOME'} ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger')"
                                          th:text="${t.type}"></span>
                                </td>
                                <td class="text-muted small" th:text="${#temporals.format(t.date, 'dd MMM yyyy')}"></td>
                                <td class="text-end">
                                    <span th:class="'fw-semibold ' + (${t.type.name() == 'INCOME'} ? 'text-success' : 'text-danger')"
                                          th:text="(${t.type.name() == 'INCOME'} ? '+' : '-') + '₹' + ${#numbers.formatDecimal(t.amount, 0, 'COMMA', 2, 'POINT')}">
                                    </span>
                                </td>
                                <td class="text-center pe-3">
                                    <div class="d-flex justify-content-center gap-1">
                                        <a th:href="@{/transactions/edit/{id}(id=${t.id})}"
                                           class="btn btn-sm btn-outline-primary rounded-pill px-2">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                        <button type="button"
                                                class="btn btn-sm btn-outline-danger rounded-pill px-2"
                                                th:data-id="${t.id}"
                                                onclick="confirmDelete(this.getAttribute('data-id'))">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <footer class="bg-white border-top text-center text-muted small py-2 px-4">
            &copy; 2024 Smart Expense Tracker
        </footer>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-body text-center p-4">
                <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3 d-block"></i>
                <h6 class="fw-bold mb-1">Delete Transaction?</h6>
                <p class="text-muted small mb-3">This action cannot be undone.</p>
                <form id="deleteForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-outline-secondary rounded-pill px-3" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger rounded-pill px-3">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    function confirmDelete(id) {
        document.getElementById('deleteForm').action = '/transactions/delete/' + id;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>
</body>
</html>
