<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="sidebar" id="sidebar" class="sidebar bg-dark text-white d-flex flex-column">
    <div class="sidebar-brand px-3 py-4 border-bottom border-secondary">
        <a th:href="@{/dashboard}" class="text-white text-decoration-none d-flex align-items-center gap-2">
            <i class="bi bi-wallet2 fs-4 text-success"></i>
            <span class="fw-bold fs-5">ExpenseTracker</span>
        </a>
    </div>

    <nav class="sidebar-nav flex-grow-1 px-2 py-3">
        <div class="text-uppercase text-secondary small mb-2 px-2" style="font-size:0.7rem; letter-spacing:0.08em;">Main</div>

        <a th:href="@{/dashboard}"
           th:classappend="${currentUri != null and currentUri.contains('/dashboard')} ? ' active' : ''"
           class="nav-link text-white rounded px-3 py-2 mb-1 d-flex align-items-center gap-2">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a th:href="@{/transactions}"
           th:classappend="${currentUri != null and currentUri == '/transactions'} ? ' active' : ''"
           class="nav-link text-white rounded px-3 py-2 mb-1 d-flex align-items-center gap-2">
            <i class="bi bi-arrow-left-right"></i> Transactions
        </a>

        <a th:href="@{/transactions/add}"
           th:classappend="${currentUri != null and currentUri == '/transactions/add'} ? ' active' : ''"
           class="nav-link text-white rounded px-3 py-2 mb-1 d-flex align-items-center gap-2">
            <i class="bi bi-plus-circle"></i> Add Transaction
        </a>
    </nav>

    <div class="sidebar-footer px-3 py-3 border-top border-secondary">
        <div class="d-flex align-items-center gap-2 mb-2">
            <div class="avatar-circle bg-success text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0">
                <i class="bi bi-person-fill"></i>
            </div>
            <div class="overflow-hidden">
                <div class="small fw-semibold text-truncate" sec:authentication="name">User</div>
                <div class="text-secondary" style="font-size:0.7rem">Logged In</div>
            </div>
        </div>
        <form th:action="@{/auth/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-outline-secondary btn-sm w-100">
                <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
        </form>
    </div>
</div>
</body>
</html>
