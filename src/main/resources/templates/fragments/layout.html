<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | Smart Expense Tracker'">Smart Expense Tracker</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<!-- Sidebar + Main Layout -->
<div class="d-flex" id="wrapper">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar bg-dark text-white d-flex flex-column">
        <div class="sidebar-brand px-3 py-4 border-bottom border-secondary">
            <a th:href="@{/dashboard}" class="text-white text-decoration-none d-flex align-items-center gap-2">
                <i class="bi bi-wallet2 fs-4 text-success"></i>
                <span class="fw-bold fs-5">ExpenseTracker</span>
            </a>
        </div>

        <nav class="sidebar-nav flex-grow-1 px-2 py-3">
            <div class="nav-section-label text-uppercase text-secondary small mb-2 px-2">Main</div>
            <a th:href="@{/dashboard}"
               th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/dashboard') ? 'active' : ''}"
               class="nav-link text-white rounded px-3 py-2 mb-1 d-flex align-items-center gap-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/transactions}"
               th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/transactions') ? 'active' : ''}"
               class="nav-link text-white rounded px-3 py-2 mb-1 d-flex align-items-center gap-2">
                <i class="bi bi-arrow-left-right"></i> Transactions
            </a>
            <a th:href="@{/transactions/add}"
               class="nav-link text-white rounded px-3 py-2 mb-1 d-flex align-items-center gap-2">
                <i class="bi bi-plus-circle"></i> Add Transaction
            </a>
        </nav>

        <div class="sidebar-footer px-3 py-3 border-top border-secondary">
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="avatar-circle bg-success text-white rounded-circle d-flex align-items-center justify-content-center">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div>
                    <div class="small fw-semibold" sec:authentication="name">User</div>
                    <div class="text-secondary" style="font-size:0.7rem">Logged In</div>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="flex-grow-1 d-flex flex-column">
        <!-- Top Navbar -->
        <nav class="navbar navbar-light bg-white border-bottom px-3 sticky-top">
            <button class="btn btn-sm btn-outline-secondary" id="sidebarToggle">
                <i class="bi bi-list fs-5"></i>
            </button>
            <span class="navbar-brand mb-0 fs-6 fw-semibold ms-2" th:text="${pageTitle}">Page</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="text-muted small" th:text="'Hello, ' + ${#authentication.name} + ' 👋'"></span>
            </div>
        </nav>

        <!-- Flash Messages -->
        <div class="container-fluid px-4 pt-3">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <div th:text="${successMessage}"></div>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div th:text="${errorMessage}"></div>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <!-- Page Content -->
        <div class="container-fluid px-4 py-2 flex-grow-1" th:replace="${content}">
            Content Here
        </div>

        <!-- Footer -->
        <footer class="bg-white border-top text-center text-muted small py-2 px-4 mt-auto">
            &copy; 2024 Smart Expense Tracker. All rights reserved.
        </footer>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script th:src="@{/js/app.js}"></script>
</body>
</html>
